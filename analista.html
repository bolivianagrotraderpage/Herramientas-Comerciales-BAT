<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analista · Precios agropecuarios · Bolivia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0D2216;
    --bg-panel: #12331F;
    --line: #2E5138;
    --text: #F4EFD9;
    --text-dim: #A9C4AF;
    --grain: #E7B93E;
    --grain-dim: #5B4712;
    --radius: 6px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    line-height:1.6;
    padding:0 0 80px;
  }
  h1,h2,h3{
    font-family:'Fraunces', serif;
    font-weight:500;
    margin:0;
    letter-spacing:-0.01em;
  }
  header{
    position:relative;
    overflow:hidden;
    padding:48px 32px 32px;
    border-bottom:1px solid var(--line);
    max-width:1080px;
    margin:0 auto;
  }
  header::before{
    content:'';
    position:absolute;
    top:-40%; left:-10%;
    width:140%; height:220%;
    background:linear-gradient(115deg,
      transparent 44%,
      rgba(244,239,217,0.05) 46%,
      rgba(244,239,217,0.09) 50%,
      rgba(244,239,217,0.05) 54%,
      transparent 56%);
    pointer-events:none;
    z-index:-1;
  }
  header .stars{
    position:relative;
    color:var(--grain);
    letter-spacing:0.3em;
    font-size:12px;
    margin-bottom:6px;
    opacity:0.85;
  }
  header .eyebrow{
    position:relative;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.12em;
    font-size:11px;
    margin-bottom:10px;
  }
  header h1{position:relative; font-size:32px;}
  header p{color:var(--text-dim); margin-top:10px; font-size:13px;}
  .page-nav{
    display:flex;
    gap:10px;
    margin-top:22px;
    flex-wrap:wrap;
  }
  .page-nav a{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    padding:8px 16px;
    border-radius:999px;
    border:1px solid var(--line);
    color:var(--text-dim);
    text-decoration:none;
  }
  .page-nav a:hover{color:var(--text); border-color:var(--text-dim);}
  .page-nav a.active{background:var(--bg-panel); color:var(--text); border-color:var(--text-dim);}
  main{max-width:1080px; margin:0 auto; padding:0 32px;}
  section{margin-top:40px;}
  .group-label{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:16px;
    color:var(--grain); background:var(--grain-dim);
  }
  .placeholder-card{
    background:var(--bg-panel);
    border:1px dashed var(--line);
    border-radius:var(--radius);
    padding:48px 32px;
    text-align:center;
    max-width:640px;
  }
  .placeholder-card h2{ font-size:22px; margin-bottom:10px; }
  .placeholder-card p{ color:var(--text-dim); font-size:13px; }
  @media (max-width:640px){
    header{padding:32px 20px 24px;}
    main{padding:0 20px;}
    header h1{font-size:26px;}
  }
</style>
</head>
<body>

<header>
  <div class="stars">★ ★ ★ ★ ★</div>
  <div class="eyebrow">Reporte de mercado · herramienta</div>
  <h1>Precios agropecuarios — Bolivia</h1>
  <p>Herramienta de análisis — próximamente</p>
  <nav class="page-nav">
    <a href="comercial.html">Comercial</a>
    <a href="analista.html" class="active">Analista</a>
  </nav>
</header>

<main>
  <section>
    <span class="group-label">Analista</span>
    <div class="placeholder-card">
      <h2>Work in progress</h2>
      <p>Esta sección está en construcción. Pronto encontrarás aquí herramientas de análisis.</p>
    </div>
  </section>
</main>

</body>
</html>
